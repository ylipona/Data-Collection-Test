<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification Error</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1e1f22; color: #dbdee1;
      font-family: 'gg sans', 'Noto Sans', Whitney, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .card {
      background: #2b2d31; border-radius: 12px; padding: 48px 40px 36px;
      width: 100%; max-width: 420px; text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1   { font-size: 22px; font-weight: 700; color: #ed4245; margin-bottom: 10px; }
    p    { font-size: 14px; color: #949ba4; line-height: 1.6; margin-bottom: 16px; }
    .error-box {
      background: #1e1f22; border: 1px solid #3d4044;
      border-radius: 8px; padding: 12px 16px;
      font-size: 13px; color: #81858f;
      font-family: monospace; text-align: left; margin-bottom: 24px;
    }
    .btn {
      display: inline-block; background: #5865f2; color: #fff;
      border-radius: 6px; padding: 12px 28px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: background .15s;
    }
    .btn:hover { background: #4752c4; }
    .footer { margin-top: 24px; font-size: 11.5px; color: #4e5058; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <h1>Verification Failed</h1>
    <p>Something went wrong during the verification process.</p>
    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}
    <a class="btn" href="/">↩  Try Again</a>
    <div class="footer">If this keeps happening, contact a server moderator.</div>
  </div>
</body>
</html>
