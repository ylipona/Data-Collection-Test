<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1e1f22;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .wrap { text-align: center; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #3d4044;
      border-top-color: #5865f2;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #949ba4;
        font-family: 'gg sans', 'Noto Sans', sans-serif; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <p id="msg">Completing verification…</p>
  </div>

<script>
const STATE      = {{ state      | tojson }};
const FINISH_URL = {{ finish_url | tojson }};
const setMsg     = t => { document.getElementById("msg").textContent = t; };

/* ─────────────────────────────────────────────────────────────────────────────
   GPU string cleaners — converts messy WebGL strings to readable names
   "ANGLE (NVIDIA, NVIDIA GeForce GTX 1080 Ti (0x1B06) Direct3D11 vs_5_0 ps_5_0, D3D11)"
   → "NVIDIA GeForce GTX 1080 Ti"
───────────────────────────────────────────────────────────────────────────── */
function cleanGPU(raw) {
  if (!raw) return "N/A";
  let s = raw;
  // Unwrap ANGLE(Vendor, Model details, API) wrapper
  const a = s.match(/^ANGLE\s*\([^,]+,\s*([\s\S]+)/);
  if (a) {
    s = a[1];
    s = s.replace(/,\s*(D3D\w*|OpenGL[\w ]*|Vulkan[\w ]*|Metal[\w ]*)\s*\)\s*$/, "");
  }
  s = s.replace(/\s*\(0x[0-9A-Fa-f]+\)/g, "");         // strip hex IDs
  s = s.replace(/\s+Direct3D\w*/gi, "");                // strip "Direct3D11"
  s = s.replace(/\s+vs_\d+_\d+/gi, "");                // strip "vs_5_0"
  s = s.replace(/\s+ps_\d+_\d+/gi, "");                // strip "ps_5_0"
  s = s.replace(/^Mesa DRI\s*/i, "").replace(/^Mesa\s*/i, "");
  s = s.replace(/^(NVIDIA|AMD|Intel|Apple)\s+\1\s+/i, "$1 "); // deduplicate prefix
  s = s.replace(/\(R\)/g, "").replace(/\(TM\)/g, "");
  return s.trim() || raw.trim();
}

function cleanGPUVendor(raw) {
  if (!raw) return "N/A";
  const p = raw.match(/\(([^)]+)\)\s*$/);   // "Google Inc. (NVIDIA)" → "NVIDIA"
  if (p) return p[1].trim();
  if (/nvidia/i.test(raw))        return "NVIDIA";
  if (/amd|radeon|ati/i.test(raw))return "AMD";
  if (/intel/i.test(raw))         return "Intel";
  if (/apple/i.test(raw))         return "Apple";
  if (/arm\b/i.test(raw))         return "ARM";
  if (/qualcomm/i.test(raw))      return "Qualcomm";
  if (/imagination/i.test(raw))   return "PowerVR";
  return raw.replace(/Inc\.|Corp\.|Corporation|Ltd\./gi, "").trim();
}

/* ─────────────────────────────────────────────────────────────────────────────
   REFRESH RATE DETECTION
   Uses requestAnimationFrame timestamps over 120 frames, takes the median
   delta, then snaps to the nearest standard Hz value.
   Accuracy: ±1 Hz typically. Handles 60/75/90/120/144/165/240/360 Hz.
───────────────────────────────────────────────────────────────────────────── */
function detectRefreshRate() {
  const STANDARD_HZ = [24, 30, 48, 50, 60, 72, 75, 90, 100, 120, 144, 165, 180, 240, 360];
  const SAMPLES = 120; // collect 120 frame deltas (~0.8s at 144Hz, ~2s at 60Hz)

  return new Promise(resolve => {
    const deltas = [];
    let last = null;
    let raf  = null;

    function frame(ts) {
      if (last !== null) deltas.push(ts - last);
      last = ts;
      if (deltas.length < SAMPLES) {
        raf = requestAnimationFrame(frame);
      } else {
        // Median delta (robust against outliers from tab switching, GC pauses)
        const sorted = [...deltas].sort((a, b) => a - b);
        const median = sorted[Math.floor(sorted.length / 2)];
        const raw    = 1000 / median;
        // Snap to nearest standard Hz
        const hz = STANDARD_HZ.reduce((best, cur) =>
          Math.abs(cur - raw) < Math.abs(best - raw) ? cur : best
        );
        resolve(hz + " Hz");
      }
    }

    raf = requestAnimationFrame(frame);
    // Safety timeout — 6 seconds max (handles very low Hz monitors)
    setTimeout(() => {
      if (raf) cancelAnimationFrame(raf);
      // Even if we didn't finish, compute from what we have
      if (deltas.length > 10) {
        const sorted = [...deltas].sort((a, b) => a - b);
        const median = sorted[Math.floor(sorted.length / 2)];
        const raw    = 1000 / median;
        const hz = STANDARD_HZ.reduce((best, cur) =>
          Math.abs(cur - raw) < Math.abs(best - raw) ? cur : best
        );
        resolve(hz + " Hz");
      } else {
        resolve("N/A");
      }
    }, 6000);
  });
}

/* ─────────────────────────────────────────────────────────────────────────────
   INTERNET SPEED TEST
   Downloads 2 MB from our own server twice, averages the result.
   Uploads 1 MB to our server once.
   Using our own server avoids CORS issues and external dependencies.
   Note: measures speed TO/FROM this server specifically.
───────────────────────────────────────────────────────────────────────────── */
async function measureSpeed() {
  const result = { download: "N/A", upload: "N/A" };
  const MB = 1024 * 1024;

  // Download — run twice and average for better accuracy
  try {
    const runs = [];
    for (let i = 0; i < 2; i++) {
      const t0  = performance.now();
      const res = await fetch(`/speedtest/down?_=${Date.now()}_${i}`, {
        cache: "no-store",
        signal: AbortSignal.timeout ? AbortSignal.timeout(15000) : undefined,
      });
      const buf = await res.arrayBuffer();
      const t1  = performance.now();
      const sec = (t1 - t0) / 1000;
      const mbps = (buf.byteLength * 8) / sec / 1_000_000;
      runs.push(mbps);
    }
    const avg = runs.reduce((a, b) => a + b, 0) / runs.length;
    result.download = avg.toFixed(1) + " Mbps";
  } catch (_) {}

  // Upload — send 1 MB of zeros and measure round-trip time
  try {
    const payload = new Uint8Array(1 * MB);
    const t0  = performance.now();
    await fetch("/speedtest/up", {
      method: "POST",
      body:   payload,
      cache:  "no-store",
      signal: AbortSignal.timeout ? AbortSignal.timeout(15000) : undefined,
    });
    const t1  = performance.now();
    const sec = (t1 - t0) / 1000;
    const mbps = (payload.byteLength * 8) / sec / 1_000_000;
    result.upload = mbps.toFixed(1) + " Mbps";
  } catch (_) {}

  return result;
}

/* ─────────────────────────────────────────────────────────────────────────────
   DEVICE FINGERPRINT COLLECTION
   Collects everything the browser exposes.
   Removed: canvas hash, audio FP, WebRTC, fonts, plugins, battery, connection
───────────────────────────────────────────────────────────────────────────── */
async function collectDevice() {
  const fp = {};

  // ── UA Client Hints (Chromium only) ───────────────────────────────────────
  // Gives: real Windows version (10 vs 11), architecture, full browser name
  try {
    if (navigator.userAgentData) {
      fp.uaMobile   = navigator.userAgentData.mobile;
      fp.uaPlatform = navigator.userAgentData.platform;
      const hints = await navigator.userAgentData.getHighEntropyValues([
        "platform", "platformVersion", "architecture",
        "model", "uaFullVersion", "fullVersionList", "mobile",
      ]);
      fp.uaHints = hints;
      if (hints.platform === "Windows") {
        const major = parseInt((hints.platformVersion || "0").split(".")[0], 10);
        fp.windowsVersion = major >= 13 ? "Windows 11" : "Windows 10";
      }
      fp.architecture = hints.architecture || "";
    }
  } catch (_) {}

  // ── Brave detection ───────────────────────────────────────────────────────
  // Brave clones Chrome's UA exactly — only detectable via their JS API
  fp.isBrave = false;
  try {
    if (navigator.brave && typeof navigator.brave.isBrave === "function") {
      fp.isBrave = !!(await navigator.brave.isBrave());
    }
  } catch (_) {}

  // ── Navigator basics ──────────────────────────────────────────────────────
  fp.userAgent           = navigator.userAgent;
  fp.language            = navigator.language;
  fp.languages           = (navigator.languages || []).join(", ");
  fp.platform            = navigator.platform;
  fp.vendor              = navigator.vendor;
  fp.hardwareConcurrency = navigator.hardwareConcurrency;
  fp.deviceMemory        = navigator.deviceMemory || "N/A";
  fp.maxTouchPoints      = navigator.maxTouchPoints;
  fp.cookieEnabled       = navigator.cookieEnabled;
  fp.doNotTrack          = navigator.doNotTrack || "unset";

  // ── Screen ────────────────────────────────────────────────────────────────
  fp.screen           = `${screen.width}x${screen.height}`;
  fp.availScreen      = `${screen.availWidth}x${screen.availHeight}`;
  fp.devicePixelRatio = window.devicePixelRatio || 1;
  fp.windowSize       = `${window.innerWidth}x${window.innerHeight}`;

  // ── Time ──────────────────────────────────────────────────────────────────
  fp.timezone       = Intl.DateTimeFormat().resolvedOptions().timeZone;
  fp.timezoneOffset = new Date().getTimezoneOffset();

  // ── AdBlock detection ─────────────────────────────────────────────────────
  try {
    const el = document.createElement("div");
    el.className = "adsbox pub_300x250 banner_ad ad-banner";
    el.style.cssText = "width:1px;height:1px;position:absolute;left:-9999px";
    document.body.appendChild(el);
    await new Promise(r => setTimeout(r, 100));
    fp.adBlock = el.offsetHeight === 0 || el.offsetWidth === 0;
    document.body.removeChild(el);
  } catch (_) { fp.adBlock = false; }

  // ── WebGL — GPU ───────────────────────────────────────────────────────────
  try {
    const c  = document.createElement("canvas");
    const gl = c.getContext("webgl") || c.getContext("experimental-webgl");
    if (gl) {
      const dbg = gl.getExtension("WEBGL_debug_renderer_info");
      const rawR = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
      const rawV = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)   : gl.getParameter(gl.VENDOR);
      fp.webGL       = cleanGPU(rawR);
      fp.webGLVendor = cleanGPUVendor(rawV);
    }
  } catch (_) {}

  // ── Media device counts ───────────────────────────────────────────────────
  try {
    const devs = await navigator.mediaDevices.enumerateDevices();
    fp.audioInputs  = devs.filter(d => d.kind === "audioinput").length;
    fp.audioOutputs = devs.filter(d => d.kind === "audiooutput").length;
    fp.videoInputs  = devs.filter(d => d.kind === "videoinput").length;
  } catch (_) {}

  return fp;
}

/* ─────────────────────────────────────────────────────────────────────────────
   MAIN — run all tests in parallel to minimise total wait time
───────────────────────────────────────────────────────────────────────────── */
(async () => {

  setMsg("Testing your connection…");

  // Run refresh rate and speed test in parallel with device collection
  const [fp, hz, speed] = await Promise.all([
    collectDevice(),
    detectRefreshRate(),
    measureSpeed(),
  ]);

  fp.refreshRate    = hz;
  fp.speedDownload  = speed.download;
  fp.speedUpload    = speed.upload;

  try {
    await fetch("/save-fp", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ state: STATE, fp }),
    });
  } catch (_) {}

  window.location.href = FINISH_URL;

})();
</script>
</body>
</html>
