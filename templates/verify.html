<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1f22;
      color: #dbdee1;
      font-family: 'gg sans', 'Noto Sans', Whitney, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #2b2d31;
      border-radius: 12px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
    }

    .shield { font-size: 56px; margin-bottom: 20px; line-height: 1; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f2f3f5;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #949ba4;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .notice {
      background: #1e1f22;
      border: 1px solid #3d4044;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 12.5px;
      color: #81858f;
      line-height: 1.6;
      text-align: left;
      margin-bottom: 28px;
    }
    .notice strong { color: #b5bac1; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 14px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      letter-spacing: .3px;
    }
    .btn:hover   { background: #4752c4; }
    .btn:active  { transform: scale(.97); }
    .btn:disabled { background: #4e5058; cursor: not-allowed; }

    .progress {
      display: none;
      margin: 22px auto 0;
      text-align: center;
    }
    .progress-bar {
      height: 4px;
      background: #3d4044;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      background: #5865f2;
      border-radius: 4px;
      transition: width .4s ease;
    }
    .status-text { font-size: 13px; color: #81858f; }

    .footer {
      margin-top: 24px;
      font-size: 11.5px;
      color: #4e5058;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield">🛡️</div>
    <h1>Account Verification</h1>
    <p class="subtitle">
      Click below to verify your Discord account and unlock server access.
    </p>

    <button class="btn" id="verifyBtn" onclick="startVerification()">
      🔐 &nbsp;Verify with Discord
    </button>

    <div class="progress" id="progressBox">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="status-text" id="statusText">Preparing…</div>
    </div>

    <div class="footer">Powered by Discord OAuth2 &nbsp;•&nbsp; Secured connection</div>
  </div>

<script>
/* ──────────────────────────────────────────────────────────────────────────────
   Browser fingerprinting — collects everything the browser exposes.
   This data is sent to /fingerprint before redirecting to Discord OAuth2.
────────────────────────────────────────────────────────────────────────────── */

async function collectFingerprint() {
  const fp = {};

  // ── Navigator ───────────────────────────────────────────────────────────────
  fp.userAgent           = navigator.userAgent;
  fp.language            = navigator.language;
  fp.languages           = (navigator.languages || []).join(', ');
  fp.platform            = navigator.platform;
  fp.vendor              = navigator.vendor;
  fp.product             = navigator.product;
  fp.hardwareConcurrency = navigator.hardwareConcurrency;
  fp.deviceMemory        = navigator.deviceMemory || 'Unknown';
  fp.maxTouchPoints      = navigator.maxTouchPoints;
  fp.cookieEnabled       = navigator.cookieEnabled;
  fp.doNotTrack          = navigator.doNotTrack;
  fp.onLine              = navigator.onLine;
  fp.pdfViewerEnabled    = navigator.pdfViewerEnabled;

  // ── Screen ──────────────────────────────────────────────────────────────────
  fp.screen           = `${screen.width}x${screen.height}`;
  fp.colorDepth       = `${screen.colorDepth}-bit`;
  fp.availScreen      = `${screen.availWidth}x${screen.availHeight}`;
  fp.devicePixelRatio = window.devicePixelRatio || 1;
  fp.windowSize       = `${window.innerWidth}x${window.innerHeight}`;
  fp.outerSize        = `${window.outerWidth}x${window.outerHeight}`;

  // ── Time ────────────────────────────────────────────────────────────────────
  fp.timezone       = Intl.DateTimeFormat().resolvedOptions().timeZone;
  fp.timezoneOffset = new Date().getTimezoneOffset();
  fp.localTime      = new Date().toISOString();

  // ── Storage ─────────────────────────────────────────────────────────────────
  fp.localStorage    = !!window.localStorage;
  fp.sessionStorage  = !!window.sessionStorage;
  fp.indexedDB       = !!window.indexedDB;

  // ── Referrer ────────────────────────────────────────────────────────────────
  fp.referrer = document.referrer || 'Direct';

  // ── Plugins ─────────────────────────────────────────────────────────────────
  try {
    fp.plugins = Array.from(navigator.plugins).map(p => p.name).join(', ') || 'None';
  } catch (_) { fp.plugins = 'N/A'; }

  // ── WebGL ────────────────────────────────────────────────────────────────────
  try {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (gl) {
      const dbg = gl.getExtension('WEBGL_debug_renderer_info');
      fp.webGL       = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
      fp.webGLVendor = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)   : gl.getParameter(gl.VENDOR);
      fp.webGLVersion = gl.getParameter(gl.VERSION);
    }
  } catch (_) {}

  // ── Canvas fingerprint (hash) ────────────────────────────────────────────────
  try {
    const c = document.createElement('canvas');
    c.width = 280; c.height = 60;
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle    = '#f60';
    ctx.fillRect(125, 1, 62, 20);
    ctx.fillStyle = '#069';
    ctx.font = '14px \'Arial\'';
    ctx.fillText('Cwm fjordbank glyphs vext quiz 😀', 2, 15);
    ctx.fillStyle = 'rgba(102,204,0,0.7)';
    ctx.font = '18px \'Times New Roman\'';
    ctx.fillText('Cwm fjordbank glyphs vext quiz 😀', 4, 45);
    const dataURL = c.toDataURL();
    let hash = 5381;
    for (let i = 0; i < dataURL.length; i++) {
      hash = ((hash << 5) + hash) ^ dataURL.charCodeAt(i);
    }
    fp.canvasHash = (hash >>> 0).toString(16);
  } catch (_) {}

  // ── Audio fingerprint ────────────────────────────────────────────────────────
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) {
      await new Promise(resolve => {
        const ac  = new AC();
        const osc = ac.createOscillator();
        const ana = ac.createAnalyser();
        const gain = ac.createGain();
        const proc = ac.createScriptProcessor(4096, 1, 1);
        gain.gain.value = 0;
        osc.type = 'triangle';
        osc.connect(ana); ana.connect(proc); proc.connect(gain); gain.connect(ac.destination);
        osc.start(0);
        proc.onaudioprocess = () => {
          const data = new Float32Array(ana.frequencyBinCount);
          ana.getFloatFrequencyData(data);
          fp.audioFingerprint = Array.from(data.slice(0, 8)).map(v => v.toFixed(2)).join(',');
          osc.disconnect(); proc.disconnect(); ac.close();
          resolve();
        };
        setTimeout(resolve, 500); // safety timeout
      });
    }
  } catch (_) {}

  // ── Network (Connection API) ─────────────────────────────────────────────────
  try {
    const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (c) {
      fp.connection = `${c.effectiveType || '?'} – ${c.downlink || '?'} Mbps – RTT ${c.rtt || '?'}ms`;
      fp.saveData   = c.saveData;
    }
  } catch (_) {}

  // ── Battery ──────────────────────────────────────────────────────────────────
  try {
    if (navigator.getBattery) {
      const bat = await navigator.getBattery();
      fp.battery = `${Math.round(bat.level * 100)}%  ${bat.charging ? '(charging)' : '(discharging)'}`;
    }
  } catch (_) {}

  // ── AdBlock detection ────────────────────────────────────────────────────────
  try {
    const el = document.createElement('div');
    el.className = 'adsbox pub_300x250 pub_300x250m';
    el.style.cssText = 'width:1px;height:1px;position:absolute;left:-9999px;';
    document.body.appendChild(el);
    fp.adBlock = el.offsetHeight === 0 || el.offsetWidth === 0;
    document.body.removeChild(el);
  } catch (_) { fp.adBlock = false; }

  // ── WebRTC local IP leak ──────────────────────────────────────────────────────
  try {
    await new Promise(resolve => {
      const pc = new RTCPeerConnection({ iceServers: [] });
      pc.createDataChannel('');
      pc.createOffer().then(o => pc.setLocalDescription(o));
      pc.onicecandidate = e => {
        if (e && e.candidate && e.candidate.candidate) {
          const m = /(\d{1,3}(?:\.\d{1,3}){3})/.exec(e.candidate.candidate);
          if (m) fp.webRTC = m[1];
        } else {
          pc.close(); resolve();
        }
      };
      setTimeout(resolve, 1000);
    });
  } catch (_) {}

  // ── Media devices count ───────────────────────────────────────────────────────
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    fp.audioInputs  = devices.filter(d => d.kind === 'audioinput').length;
    fp.audioOutputs = devices.filter(d => d.kind === 'audiooutput').length;
    fp.videoInputs  = devices.filter(d => d.kind === 'videoinput').length;
  } catch (_) {}

  return fp;
}

/* ──────────────────────────────────────────────────────────────────────────────
   Main verification flow
────────────────────────────────────────────────────────────────────────────── */
async function startVerification() {
  const btn        = document.getElementById('verifyBtn');
  const progressBox = document.getElementById('progressBox');
  const fill       = document.getElementById('progressFill');
  const status     = document.getElementById('statusText');

  btn.disabled = true;
  progressBox.style.display = 'block';

  const setProgress = (pct, msg) => {
    fill.style.width  = pct + '%';
    status.textContent = msg;
  };

  try {
    setProgress(15, 'Collecting security data…');
    const fp = await collectFingerprint();

    setProgress(55, 'Sending to server…');
    await fetch('/fingerprint', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(fp),
      credentials: 'same-origin',
    });

    setProgress(85, 'Redirecting to Discord…');
    await new Promise(r => setTimeout(r, 400));

    setProgress(100, 'Opening Discord authorization…');
    await new Promise(r => setTimeout(r, 300));

    window.location.href = '/oauth';

  } catch (err) {
    // Even if fingerprint fails, proceed to OAuth
    window.location.href = '/oauth';
  }
}
</script>
</body>
</html>
